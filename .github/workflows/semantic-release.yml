name: semantic-release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Detect bootstrap tag
        id: bootstrap
        shell: bash
        run: |
          set -euo pipefail
          if git tag --list 'py-v*' | grep -q .; then
            echo "has_bootstrap_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_bootstrap_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip until bootstrap tag exists
        if: steps.bootstrap.outputs.has_bootstrap_tag != 'true'
        shell: bash
        run: |
          echo "No py-v* bootstrap tag exists yet; skipping semantic-release."

      - name: Install test and release tooling
        if: steps.bootstrap.outputs.has_bootstrap_tag == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install pytest ruff mypy httpx numpy

      - name: Run tests
        if: steps.bootstrap.outputs.has_bootstrap_tag == 'true'
        run: python -m pytest -q

      - name: Run lint
        if: steps.bootstrap.outputs.has_bootstrap_tag == 'true'
        run: python -m ruff check .

      - name: Run type checks
        if: steps.bootstrap.outputs.has_bootstrap_tag == 'true'
        run: python -m mypy src

      - name: Configure git author
        if: steps.bootstrap.outputs.has_bootstrap_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release
        if: steps.bootstrap.outputs.has_bootstrap_tag == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx -y \
            -p semantic-release \
            -p @semantic-release/commit-analyzer \
            -p @semantic-release/release-notes-generator \
            -p @semantic-release/changelog \
            -p @semantic-release/exec \
            -p @semantic-release/git \
            -p conventional-changelog-conventionalcommits \
            semantic-release

